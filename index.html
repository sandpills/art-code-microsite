<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y12 Art &amp; Code</title>
    <link rel="stylesheet" href="style/shared.css">
    <link rel="stylesheet" href="style/styles.css">
</head>

<body>

    <div id="coords">0, 0</div>
    <div id="canvas">
        <!-- <div id="block-1"></div>
        <div id="block-2"></div>
        <div id="block-3"></div>
        <div id="block-4"></div>
        <div id="block-5"></div>
        <div id="block-6"></div>
        <div id="block-7"></div> -->
        <form class="scattered" id="form-search" onsubmit="return false">
            <input type="text" placeholder="art and code?">
            <button>OK</button>
        </form>
        <form class="scattered" id="form-select" onsubmit="return false">
            <select>
                <option>art</option>
                <option>code</option>
                <option>both</option>
                <option>neither</option>
                <option>???</option>
            </select>
        </form>

        <div class="scattered" id="slider">
            <input type="range" min="0" max="100" value="50">
        </div>

        <div class="scattered" id="checkboxes">
            <label><input type="checkbox"> art &amp; code</label>
            <label><input type="checkbox" checked> art &amp; code</label>
            <label><input type="checkbox"> art &amp; code</label>
        </div>

        <div class="scattered" id="radios">
            <label><input type="radio" name="r1"> art</label>
            <label><input type="radio" name="r1" checked> code</label>
            <label><input type="radio" name="r1"> maybe</label>
        </div>

        <form class="scattered" id="form-note" onsubmit="return false">
            <textarea placeholder="leave a message"></textarea>
        </form>

        <button class="scattered" id="btn-ok">OK (red)</button>

        <div class="scattered" id="quote">
            <input type="text" value="art&code&art&code&art&code" readonly>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
